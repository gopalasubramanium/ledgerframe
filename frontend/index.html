<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LedgerFrame</title>
    <script>
      // Stamp the resolved theme before first paint to avoid a flash.
      // Mirrors src/theme — kept tiny and value-free (no tokens here).
      (function () {
        var root = document.documentElement;
        function mq(q) {
          try {
            return window.matchMedia(q).matches;
          } catch (e) {
            return false;
          }
        }
        try {
          var theme = localStorage.getItem("lf.theme") || "system";
          var dark =
            theme === "dark" ||
            (theme === "system" && mq("(prefers-color-scheme: dark)"));
          root.setAttribute("data-theme", dark ? "dark" : "light");

          var density = localStorage.getItem("lf.density") || "comfortable";
          root.setAttribute("data-density", density);

          var contrast = localStorage.getItem("lf.contrast") || "system";
          root.setAttribute(
            "data-contrast",
            contrast === "high" ||
              (contrast === "system" && mq("(prefers-contrast: more)"))
              ? "high"
              : "normal",
          );

          var motion = localStorage.getItem("lf.motion") || "system";
          root.setAttribute(
            "data-motion",
            motion === "reduced" ||
              (motion === "system" && mq("(prefers-reduced-motion: reduce)"))
              ? "reduced"
              : "full",
          );
        } catch (e) {
          root.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
