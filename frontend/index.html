<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LedgerFrame</title>
    <script>
      // Stamp the resolved theme before first paint to avoid a flash.
      // Mirrors src/theme — kept tiny and value-free (no tokens here).
      (function () {
        try {
          var choice = localStorage.getItem("lf.theme") || "system";
          var dark =
            choice === "dark" ||
            (choice === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light",
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
